filter:
  dependency_paths:
    - 'vendor/'
  excluded_paths:
    - 'tests/'
    - 'tools/'

build:
  dependencies: { override: true }
  nodes:
    analysis: # see https://scrutinizer-ci.com/docs/tools/php/php-scrutinizer/
      environment:
        php:
          version: 7.4
      project_setup: { override: true }
      tests: { override: true }

tools:
  external_code_coverage: true
